<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>מערכת טבלת צדק</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --ios-bg: #F2F2F7; --ios-blue: #007AFF; }
        body { background-color: var(--ios-bg); font-family: -apple-system, system-ui; margin: 0; padding: 0; }
        .tab-content { display: none; padding-bottom: 140px; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .ios-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(10px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; padding-bottom: 60px; }
        input, select, textarea { width: 100%; border: 1px solid #ddd; padding: 14px; border-radius: 12px; background: #f9f9f9; margin-bottom: 12px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--ios-blue); }
        .btn-primary { background: var(--ios-blue); color: white; padding: 16px; border-radius: 14px; font-weight: bold; width: 100%; transition: opacity 0.2s; }
        .btn-primary:active { opacity: 0.7; }
        .safe-top { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b px-5 py-4 flex justify-between items-center safe-top">
        <h1 id="page-title" class="text-2xl font-bold tracking-tight text-gray-900">טבלת צדק</h1>
        <button onclick="openModal('addExecution')" class="bg-blue-600 text-white p-2 rounded-full shadow-lg active:scale-90 transition">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
    </header>

    <main class="p-4">
        <section id="justice" class="tab-content active">
            <div class="flex gap-2 mb-4">
                <select id="justiceSort" onchange="renderJustice()" class="flex-1 shadow-sm">
                    <option value="totalDesc">מיון: ציון גבוה</option>
                    <option value="totalAsc">מיון: ציון נמוך</option>
                </select>
                <input type="text" id="justiceFilter" oninput="renderJustice()" placeholder="Show only (שם/מדור...)" class="flex-1 shadow-sm">
            </div>
            <div id="justiceList"></div>
        </section>

        <section id="people" class="tab-content">
            <div class="flex gap-2 mb-4">
                <input type="text" id="peopleFilter" oninput="renderPeople()" placeholder="חפש איש..." class="flex-1 shadow-sm">
                <button onclick="openModal('addPerson')" class="bg-blue-600 text-white px-4 rounded-xl shadow-sm"><i data-lucide="user-plus"></i></button>
            </div>
            <div id="peopleList"></div>
        </section>

        <section id="guards" class="tab-content">
            <button onclick="openModal('addGuard')" class="ios-card w-full flex items-center justify-center gap-2 text-blue-600 font-bold mb-4 border-2 border-dashed border-blue-100">
                <i data-lucide="shield-plus"></i> הגדרת שמירה חדשה
            </button>
            <div id="guardsList"></div>
        </section>

        <section id="duties" class="tab-content">
            <button onclick="openModal('addDuty')" class="ios-card w-full flex items-center justify-center gap-2 text-blue-600 font-bold mb-4 border-2 border-dashed border-blue-100">
                <i data-lucide="clipboard-list"></i> הגדרת תורנות חדשה
            </button>
            <div id="dutiesList"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t flex justify-around py-4 pb-10 z-50">
        <button onclick="switchTab('justice')" id="btn-justice" class="text-blue-600 flex flex-col items-center"><i data-lucide="scale"></i><span class="text-[10px] mt-1 font-bold">צדק</span></button>
        <button onclick="switchTab('people')" id="btn-people" class="text-gray-400 flex flex-col items-center"><i data-lucide="users"></i><span class="text-[10px] mt-1 font-bold">אנשים</span></button>
        <button onclick="switchTab('guards')" id="btn-guards" class="text-gray-400 flex flex-col items-center"><i data-lucide="shield"></i><span class="text-[10px] mt-1 font-bold">שמירות</span></button>
        <button onclick="switchTab('duties')" id="btn-duties" class="text-gray-400 flex flex-col items-center"><i data-lucide="coffee"></i><span class="text-[10px] mt-1 font-bold">תורנויות</span></button>
    </nav>

    <div id="addExecutionModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">שיבוץ חדש</h2>
            <form id="execForm">
                <label class="text-xs text-gray-500 px-1">מי החייל?</label>
                <select id="execPerson" required></select>
                <label class="text-xs text-gray-500 px-1">מה המשימה?</label>
                <select id="execTask" required></select>
                <label class="text-xs text-gray-500 px-1">תאריך</label>
                <input type="date" id="execDate" required>
                <button type="submit" class="btn-primary mt-4 shadow-blue-200 shadow-xl">שמור שיבוץ</button>
                <button type="button" onclick="closeAllModals()" class="w-full py-4 text-gray-400 font-medium">ביטול</button>
            </form>
        </div>
    </div>

    <div id="addPersonModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">הוספת חייל חדש</h2>
            <form id="personForm">
                <input type="number" id="pId" placeholder="מספר אישי" required>
                <input type="text" id="pName" placeholder="שם מלא" required>
                <input type="text" id="pSection" placeholder="מדור" required>
                <input type="text" id="pTeam" placeholder="צוות" required>
                <input type="text" id="pService" placeholder="סוג שירות (חובה/קבע)">
                <textarea id="pExemptions" placeholder="פטורים (למשל: לינה בבית, שמירה בישיבה)"></textarea>
                <button type="submit" class="btn-primary">הוסף איש</button>
            </form>
        </div>
    </div>

    <div id="addGuardModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">הגדרת סוג שמירה</h2>
            <form id="guardForm">
                <input type="text" id="gType" placeholder="שם השמירה (למשל: שמירת יום)" required>
                <input type="text" id="gLoc" placeholder="מיקום">
                <input type="number" id="gRank" placeholder="דירוג / ניקוד" required>
                <input type="text" id="gArm" placeholder="מחסן נשק">
                <button type="submit" class="btn-primary">שמור שמירה</button>
            </form>
        </div>
    </div>

    <div id="addDutyModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">הגדרת סוג תורנות</h2>
            <form id="dutyForm">
                <input type="text" id="dType" placeholder="שם התורנות (למשל: תורן מטבח)" required>
                <input type="text" id="dLoc" placeholder="מיקום">
                <input type="number" id="dRank" placeholder="דירוג / ניקוד" required>
                <button type="submit" class="btn-primary">שמור תורנות</button>
            </form>
        </div>
    </div>

    <div id="personInfoModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <div id="personDetailsUI"></div>
            <div class="mt-6">
                <h3 class="font-bold border-b pb-2 mb-3 text-gray-700">היסטוריה</h3>
                <div id="personHistoryUI" class="space-y-3 max-h-48 overflow-y-auto pr-1"></div>
            </div>
            <button id="deletePersonBtn" class="w-full text-red-500 font-bold py-6 mt-6 border-t active:bg-red-50 transition">מחק איש לצמיתות</button>
            <button onclick="closeAllModals()" class="w-full py-4 text-gray-400 font-medium">סגור</button>
        </div>
    </div>

    <script>
        // Database
        const db = new Dexie("JusticeAppV1");
        db.version(1).stores({
            people: 'personalId, name, section, team, serviceType, exemptions',
            guards: '++id, type, location, rank',
            duties: '++id, type, location, rank',
            executions: '++id, taskId, personalId, date, category, score, taskName'
        });

        async function init() {
            lucide.createIcons();
            await renderJustice();
            updateDropdowns();
        }

        // --- Renders ---
        async function renderJustice() {
            const filter = document.getElementById('justiceFilter').value.toLowerCase();
            const sort = document.getElementById('justiceSort').value;
            const people = await db.people.toArray();
            const execs = await db.executions.toArray();

            let data = people.map(p => {
                const pExecs = execs.filter(e => e.personalId == p.personalId);
                const gScore = pExecs.filter(e => e.category === 'guard').reduce((s, e) => s + Number(e.score), 0);
                const dScore = pExecs.filter(e => e.category === 'duty').reduce((s, e) => s + Number(e.score), 0);
                return { ...p, gScore, dScore, total: gScore + dScore };
            });

            if(filter) data = data.filter(p => p.name.includes(filter) || p.personalId.toString().includes(filter) || p.section.includes(filter));
            data.sort((a,b) => sort === 'totalDesc' ? b.total - a.total : a.total - b.total);

            document.getElementById('justiceList').innerHTML = data.map(p => `
                <div class="ios-card flex justify-between items-center active:bg-gray-50 transition" onclick="showPerson('${p.personalId}')">
                    <div>
                        <div class="font-bold text-lg text-gray-900">${p.name}</div>
                        <div class="text-xs text-gray-400">${p.section} | ${p.team}</div>
                    </div>
                    <div class="text-left">
                        <div class="text-2xl font-black text-blue-600 leading-none">${p.total}</div>
                        <div class="text-[10px] text-gray-400 mt-1 uppercase">ש: ${p.gScore} | ת: ${p.dScore}</div>
                    </div>
                </div>
            `).join('') || '<p class="text-center text-gray-400 mt-10">אין נתונים להצגה</p>';
        }

        async function renderPeople() {
            const filter = document.getElementById('peopleFilter').value.toLowerCase();
            const people = await db.people.toArray();
            const filtered = people.filter(p => p.name.toLowerCase().includes(filter) || p.personalId.toString().includes(filter));
            document.getElementById('peopleList').innerHTML = filtered.map(p => `
                <div class="ios-card flex justify-between items-center active:bg-gray-50 transition" onclick="showPerson('${p.personalId}')">
                    <div><strong class="text-gray-900">${p.name}</strong><br><span class="text-xs text-gray-500">מ.א ${p.personalId}</span></div>
                    <i data-lucide="chevron-left" class="text-gray-300 w-5 h-5"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function renderGuards() {
            const list = await db.guards.toArray();
            document.getElementById('guardsList').innerHTML = list.map(g => `
                <div class="ios-card flex justify-between items-center">
                    <div><strong>${g.type}</strong><br><span class="text-xs text-gray-500">${g.location || 'ללא מיקום'} | ניקוד: ${g.rank}</span></div>
                    <button onclick="deleteItem('guards', ${g.id})" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function renderDuties() {
            const list = await db.duties.toArray();
            document.getElementById('dutiesList').innerHTML = list.map(d => `
                <div class="ios-card flex justify-between items-center">
                    <div><strong>${d.type}</strong><br><span class="text-xs text-gray-500">${d.location || 'ללא מיקום'} | ניקוד: ${d.rank}</span></div>
                    <button onclick="deleteItem('duties', ${d.id})" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function showPerson(id) {
            const p = await db.people.get(id);
            const execs = await db.executions.where('personalId').equals(id).toArray();
            document.getElementById('personDetailsUI').innerHTML = `
                <h2 class="text-3xl font-bold text-gray-900">${p.name}</h2>
                <p class="text-gray-500 font-medium">מ.א ${p.personalId} • ${p.section} - ${p.team}</p>
                <div class="bg-blue-50 p-4 rounded-xl mt-4 text-blue-800 text-sm leading-relaxed">
                    <strong>פטורים:</strong><br>${p.exemptions || 'אין פטורים רשומים'}
                </div>
            `;
            document.getElementById('personHistoryUI').innerHTML = execs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(e => `
                <div class="flex justify-between items-center text-sm py-2 border-b border-gray-50">
                    <div>
                        <span class="block font-bold text-gray-800">${e.taskName}</span>
                        <span class="text-[10px] text-gray-400">${e.date}</span>
                    </div>
                    <span class="font-black text-blue-600 bg-blue-50 px-2 py-1 rounded-md">+${e.score}</span>
                </div>
            `).join('') || '<p class="text-gray-400 text-center py-4">אין היסטוריה רשומה</p>';
            
            document.getElementById('deletePersonBtn').onclick = async () => {
                if(confirm(`למחוק את ${p.name} מהמערכת?`)) {
                    await db.people.delete(id);
                    await db.executions.where('personalId').equals(id).delete();
                    closeAllModals(); renderJustice(); renderPeople();
                }
            };
            openModal('personInfo');
        }

        // --- Business Logic ---
        async function updateDropdowns() {
            const p = await db.people.toArray();
            const g = await db.guards.toArray();
            const d = await db.duties.toArray();
            document.getElementById('execPerson').innerHTML = p.map(i => `<option value="${i.personalId}">${i.name} (${i.personalId})</option>`).join('') || '<option disabled>אין חיילים רשומים</option>';
            
            let tasks = `<optgroup label="שמירות">` + g.map(i => `<option value="guard|${i.rank}|${i.type}">${i.type} (${i.rank} נק')</option>`).join('') + `</optgroup>`;
            tasks += `<optgroup label="תורנויות">` + d.map(i => `<option value="duty|${i.rank}|${i.type}">${i.type} (${i.rank} נק')</option>`).join('') + `</optgroup>`;
            document.getElementById('execTask').innerHTML = tasks;
        }

        document.getElementById('personForm').onsubmit = async (e) => {
            e.preventDefault();
            await db.people.add({
                personalId: document.getElementById('pId').value,
                name: document.getElementById('pName').value,
                section: document.getElementById('pSection').value,
                team: document.getElementById('pTeam').value,
                serviceType: document.getElementById('pService').value,
                exemptions: document.getElementById('pExemptions').value
            });
            e.target.reset(); closeAllModals(); renderPeople(); renderJustice(); updateDropdowns();
        };

        document.getElementById('guardForm').onsubmit = async (e) => {
            e.preventDefault();
            await db.guards.add({ type: document.getElementById('gType').value, location: document.getElementById('gLoc').value, rank: document.getElementById('gRank').value, armory: document.getElementById('gArm').value });
            e.target.reset(); closeAllModals(); renderGuards(); updateDropdowns();
        };

        document.getElementById('dutyForm').onsubmit = async (e) => {
            e.preventDefault();
            await db.duties.add({ type: document.getElementById('dType').value, location: document.getElementById('dLoc').value, rank: document.getElementById('dRank').value });
            e.target.reset(); closeAllModals(); renderDuties(); updateDropdowns();
        };

        document.getElementById('execForm').onsubmit = async (e) => {
            e.preventDefault();
            const [cat, score, name] = document.getElementById('execTask').value.split('|');
            await db.executions.add({
                personalId: document.getElementById('execPerson').value,
                score: score,
                taskName: name,
                category: cat,
                date: document.getElementById('execDate').value
            });
            closeAllModals(); renderJustice();
        };

        async function deleteItem(table, id) {
            if(confirm('למחוק הגדרה זו?')) { await db[table].delete(id); renderGuards(); renderDuties(); updateDropdowns(); }
        }

        // --- Navigation ---
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-blue-600', 'text-gray-400'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.replace('text-gray-400', 'text-blue-600');
            document.getElementById('page-title').innerText = {justice:'טבלת צדק', people:'אנשים', guards:'שמירות', duties:'תורנויות'}[id];
            if(id === 'guards') renderGuards();
            if(id === 'duties') renderDuties();
            if(id === 'people') renderPeople();
            if(id === 'justice') renderJustice();
        }

        function openModal(id) { document.getElementById(id + 'Modal').style.display = 'block'; }
        function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function closeModalOnBackdrop(e) { if(e.target.classList.contains('modal')) closeAllModals(); }

        window.onload = init;
    </script>
</body>
</html>
