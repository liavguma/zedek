<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>מערכת טבלת צדק</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --ios-bg: #F2F2F7; --ios-blue: #007AFF; }
        body { background-color: var(--ios-bg); font-family: -apple-system, system-ui; margin: 0; padding: 0; min-height: 100vh; }
        
        /* תיקון ריווח מהמצלמה (Dynamic Island) */
        header {
            padding-top: env(safe-area-inset-top); 
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .safe-top { padding-top: 15px; padding-bottom: 12px; }

        .tab-content { display: none; padding-bottom: 140px; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .ios-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; padding-bottom: calc(env(safe-area-inset-bottom) + 60px); }
        
        input, select, textarea { width: 100%; border: 1px solid #ddd; padding: 14px; border-radius: 12px; background: #f9f9f9; margin-bottom: 12px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--ios-blue); }
        .btn-primary { background: var(--ios-blue); color: white; padding: 16px; border-radius: 14px; font-weight: bold; width: 100%; transition: opacity 0.2s; }
        .btn-primary:active { opacity: 0.7; }
        
        nav { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>

    <header class="bg-white/80 sticky top-0 z-50 border-b px-5">
        <div class="safe-top flex justify-between items-center">
            <h1 id="page-title" class="text-2xl font-bold tracking-tight text-gray-900">טבלת צדק</h1>
            <div class="flex items-center gap-3">
                <label class="cursor-pointer text-gray-500 active:scale-90 transition p-1">
                    <i data-lucide="upload-cloud"></i>
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </label>
                <button onclick="exportData()" class="text-gray-500 active:scale-90 transition p-1">
                    <i data-lucide="download-cloud"></i>
                </button>
                <button onclick="openModal('addExecution')" class="bg-blue-600 text-white p-2 rounded-full shadow-lg active:scale-90 transition ml-1">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4">
        <section id="justice" class="tab-content active">
            <div class="flex gap-2 mb-4">
                <select id="justiceSort" onchange="renderJustice()" class="flex-1 shadow-sm">
                    <option value="totalDesc">מיון: ציון גבוה</option>
                    <option value="totalAsc">מיון: ציון נמוך</option>
                </select>
                <input type="text" id="justiceFilter" oninput="renderJustice()" placeholder="חיפוש חופשי..." class="flex-1 shadow-sm">
            </div>
            <div id="justiceList"></div>
        </section>

        <section id="people" class="tab-content">
            <div class="flex gap-2 mb-4">
                <input type="text" id="peopleFilter" oninput="renderPeople()" placeholder="חפש איש..." class="flex-1 shadow-sm">
                <button onclick="openModal('addPerson')" class="bg-blue-600 text-white px-4 rounded-xl shadow-sm"><i data-lucide="user-plus"></i></button>
            </div>
            <div id="peopleList"></div>
        </section>

        <section id="guards" class="tab-content">
            <button onclick="openModal('addGuard')" class="ios-card w-full flex items-center justify-center gap-2 text-blue-600 font-bold mb-4 border-2 border-dashed border-blue-100 text-sm">
                <i data-lucide="shield-plus"></i> הגדרת שמירה חדשה
            </button>
            <div id="guardsList"></div>
        </section>

        <section id="duties" class="tab-content">
            <button onclick="openModal('addDuty')" class="ios-card w-full flex items-center justify-center gap-2 text-blue-600 font-bold mb-4 border-2 border-dashed border-blue-100 text-sm">
                <i data-lucide="clipboard-list"></i> הגדרת תורנות חדשה
            </button>
            <div id="dutiesList"></div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t flex justify-around py-4 pb-10 z-50 text-gray-400">
        <button onclick="switchTab('justice')" id="btn-justice" class="text-blue-600 flex flex-col items-center"><i data-lucide="scale"></i><span class="text-[10px] mt-1 font-bold">צדק</span></button>
        <button onclick="switchTab('people')" id="btn-people" class="flex flex-col items-center"><i data-lucide="users"></i><span class="text-[10px] mt-1 font-bold">אנשים</span></button>
        <button onclick="switchTab('guards')" id="btn-guards" class="flex flex-col items-center"><i data-lucide="shield"></i><span class="text-[10px] mt-1 font-bold">שמירות</span></button>
        <button onclick="switchTab('duties')" id="btn-duties" class="flex flex-col items-center"><i data-lucide="coffee"></i><span class="text-[10px] mt-1 font-bold">תורנויות</span></button>
    </nav>

    <div id="addExecutionModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2 class="text-xl font-bold mb-4 border-b pb-2 text-center">שיבוץ חדש</h2><form id="execForm"><label class="text-xs text-gray-500 px-1">מי החייל?</label><select id="execPerson" required></select><label class="text-xs text-gray-500 px-1">מה המשימה?</label><select id="execTask" required></select><label class="text-xs text-gray-500 px-1">תאריך</label><input type="date" id="execDate" required><button type="submit" class="btn-primary mt-4">שמור שיבוץ</button><button type="button" onclick="closeAllModals()" class="w-full py-4 text-gray-400">ביטול</button></form></div></div>
    
    <div id="addPersonModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <h2 id="personModalTitle" class="text-xl font-bold mb-4 border-b pb-2">הוספת חייל</h2>
            <form id="personForm">
                <input type="number" id="pId" placeholder="מספר אישי" required>
                <input type="text" id="pName" placeholder="שם מלא" required>
                <input type="text" id="pSection" placeholder="מדור" required>
                <input type="text" id="pTeam" placeholder="צוות" required>
                <select id="pService">
                    <option value="">בחר סוג שירות</option>
                    <option value="חובה">חובה</option>
                    <option value="קבע">קבע</option>
                    <option value="אחר">אחר</option>
                </select>
                <textarea id="pExemptions" placeholder="פטורים..."></textarea>
                <button type="submit" class="btn-primary">שמור</button>
                <button type="button" onclick="closeAllModals()" class="w-full py-2 text-gray-400">ביטול</button>
            </form>
        </div>
    </div>

    <div id="addGuardModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2 class="text-xl font-bold mb-4 border-b pb-2 text-center">הגדרת שמירה</h2><form id="guardForm"><input type="text" id="gType" placeholder="שם השמירה" required><input type="text" id="gLoc" placeholder="מיקום"><input type="number" id="gRank" placeholder="ניקוד" required><input type="text" id="gArm" placeholder="מחסן נשק"><button type="submit" class="btn-primary">שמור</button></form></div></div>
    <div id="addDutyModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2 class="text-xl font-bold mb-4 border-b pb-2 text-center">הגדרת תורנות</h2><form id="dutyForm"><input type="text" id="dType" placeholder="שם התורנות" required><input type="text" id="dLoc" placeholder="מיקום"><input type="number" id="dRank" placeholder="ניקוד" required><button type="submit" class="btn-primary">שמור</button></form></div></div>
    
    <div id="personInfoModal" class="modal" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content">
            <div id="personDetailsUI"></div>
            <div class="mt-4 flex gap-2">
                <button id="editPersonBtn" class="flex-1 bg-gray-100 py-3 rounded-xl font-bold text-gray-700 active:bg-gray-200">ערוך פרטים</button>
            </div>
            <div class="mt-6">
                <h3 class="font-bold border-b pb-2 mb-3 text-gray-700 text-sm">היסטוריית משימות</h3>
                <div id="personHistoryUI" class="space-y-3 max-h-48 overflow-y-auto pr-1"></div>
            </div>
            <button id="deletePersonBtn" class="w-full text-red-500 font-bold py-6 mt-6 border-t active:bg-red-50">מחק איש לצמיתות</button>
            <button onclick="closeAllModals()" class="w-full py-4 text-gray-400 font-medium text-sm">סגור</button>
        </div>
    </div>

    <script>
        const db = new Dexie("JusticeAppV1");
        db.version(2).stores({
            people: 'personalId, name, section, team, serviceType, exemptions',
            guards: '++id, type, location, rank',
            duties: '++id, type, location, rank',
            executions: '++id, taskId, personalId, date, category, score, taskName'
        });

        let editingPersonId = null;

        async function init() { lucide.createIcons(); await renderJustice(); updateDropdowns(); }

        // Export/Import
        async function exportData() {
            const data = {
                people: await db.people.toArray(),
                guards: await db.guards.toArray(),
                duties: await db.duties.toArray(),
                executions: await db.executions.toArray()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm("ייבוא יחליף את כל הנתונים הקיימים. להמשיך?")) {
                        await db.people.clear(); await db.guards.clear(); await db.duties.clear(); await db.executions.clear();
                        await db.people.bulkAdd(data.people || []);
                        await db.guards.bulkAdd(data.guards || []);
                        await db.duties.bulkAdd(data.duties || []);
                        await db.executions.bulkAdd(data.executions || []);
                        location.reload();
                    }
                } catch (err) { alert("שגיאה בייבוא הקובץ"); }
            };
            reader.readAsText(file);
        }

        // Renders
        async function renderJustice() {
            const filter = document.getElementById('justiceFilter').value.toLowerCase();
            const sort = document.getElementById('justiceSort').value;
            const people = await db.people.toArray();
            const execs = await db.executions.toArray();
            let data = people.map(p => {
                const pExecs = execs.filter(e => e.personalId == p.personalId);
                const gScore = pExecs.filter(e => e.category === 'guard').reduce((s, e) => s + Number(e.score), 0);
                const dScore = pExecs.filter(e => e.category === 'duty').reduce((s, e) => s + Number(e.score), 0);
                return { ...p, gScore, dScore, total: gScore + dScore };
            });
            if(filter) data = data.filter(p => p.name.includes(filter) || p.personalId.toString().includes(filter));
            data.sort((a,b) => sort === 'totalDesc' ? b.total - a.total : a.total - b.total);
            document.getElementById('justiceList').innerHTML = data.map(p => `
                <div class="ios-card flex justify-between items-center active:bg-gray-50 transition" onclick="showPerson('${p.personalId}')">
                    <div><div class="font-bold text-lg">${p.name}</div><div class="text-xs text-gray-400">${p.section} | ${p.serviceType || ''}</div></div>
                    <div class="text-left font-black text-blue-600 text-2xl leading-none">${p.total}</div>
                </div>`).join('');
        }

        async function renderPeople() {
            const filter = document.getElementById('peopleFilter').value.toLowerCase();
            const people = await db.people.toArray();
            const filtered = people.filter(p => p.name.toLowerCase().includes(filter) || p.personalId.toString().includes(filter));
            document.getElementById('peopleList').innerHTML = filtered.map(p => `<div class="ios-card flex justify-between items-center" onclick="showPerson('${p.personalId}')"><div><strong>${p.name}</strong><br><span class="text-xs text-gray-500">${p.personalId} | ${p.serviceType || ''}</span></div><i data-lucide="chevron-left" class="text-gray-300 w-5"></i></div>`).join('');
            lucide.createIcons();
        }

        async function renderGuards() {
            const list = await db.guards.toArray();
            document.getElementById('guardsList').innerHTML = list.map(g => `<div class="ios-card flex justify-between items-center"><div><strong>${g.type}</strong><br><span class="text-xs text-gray-500">${g.location || ''} | ניקוד: ${g.rank}</span></div><button onclick="deleteItem('guards', ${g.id})" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-5"></i></button></div>`).join('');
            lucide.createIcons();
        }

        async function renderDuties() {
            const list = await db.duties.toArray();
            document.getElementById('dutiesList').innerHTML = list.map(d => `<div class="ios-card flex justify-between items-center"><div><strong>${d.type}</strong><br><span class="text-xs text-gray-500">${d.location || ''} | ניקוד: ${d.rank}</span></div><button onclick="deleteItem('duties', ${d.id})" class="text-red-400 p-2"><i data-lucide="trash-2" class="w-5"></i></button></div>`).join('');
            lucide.createIcons();
        }

        async function showPerson(id) {
            const p = await db.people.get(id);
            const execs = await db.executions.where('personalId').equals(id).toArray();
            document.getElementById('personDetailsUI').innerHTML = `
                <h2 class="text-3xl font-bold">${p.name}</h2>
                <p class="text-gray-500">מ.א ${p.personalId} • ${p.section} • ${p.serviceType || ''}</p>
                <div class="bg-blue-50 p-4 rounded-xl mt-4 text-sm leading-relaxed"><strong>פטורים:</strong><br>${p.exemptions || 'אין'}</div>`;
            
            document.getElementById('personHistoryUI').innerHTML = execs.map(e => `
                <div class="flex justify-between py-1 border-b border-gray-50"><span>${e.date} - ${e.taskName}</span><span class="font-bold text-blue-600">+${e.score}</span></div>`).join('');
            
            document.getElementById('editPersonBtn').onclick = () => {
                closeAllModals(); // חשוב: לסגור את חלונית המידע לפני פתיחת העריכה
                setTimeout(() => startEditPerson(p), 100);
            };
            document.getElementById('deletePersonBtn').onclick = async () => { if(confirm('למחוק?')) { await db.people.delete(id); await db.executions.where('personalId').equals(id).delete(); closeAllModals(); renderJustice(); renderPeople(); } };
            openModal('personInfo');
        }

        function startEditPerson(person) {
            editingPersonId = person.personalId;
            document.getElementById('personModalTitle').innerText = "עריכת חייל";
            document.getElementById('pId').value = person.personalId;
            document.getElementById('pId').disabled = true;
            document.getElementById('pName').value = person.name;
            document.getElementById('pSection').value = person.section;
            document.getElementById('pTeam').value = person.team;
            document.getElementById('pService').value = person.serviceType || "";
            document.getElementById('pExemptions').value = person.exemptions || "";
            openModal('addPerson');
        }

        async function updateDropdowns() {
            const p = await db.people.toArray(); const g = await db.guards.toArray(); const d = await db.duties.toArray();
            document.getElementById('execPerson').innerHTML = p.map(i => `<option value="${i.personalId}">${i.name}</option>`).join('');
            let tasks = `<optgroup label="שמירות">` + g.map(i => `<option value="guard|${i.rank}|${i.type}">${i.type} (${i.rank})</option>`).join('') + `</optgroup>`;
            tasks += `<optgroup label="תורנויות">` + d.map(i => `<option value="duty|${i.rank}|${i.type}">${i.type} (${i.rank})</option>`).join('') + `</optgroup>`;
            document.getElementById('execTask').innerHTML = tasks;
        }

        // Form Submit
        document.getElementById('personForm').onsubmit = async (e) => {
            e.preventDefault();
            const personData = {
                personalId: document.getElementById('pId').value,
                name: document.getElementById('pName').value,
                section: document.getElementById('pSection').value,
                team: document.getElementById('pTeam').value,
                serviceType: document.getElementById('pService').value,
                exemptions: document.getElementById('pExemptions').value
            };
            
            if (editingPersonId) {
                await db.people.update(editingPersonId, personData);
            } else {
                await db.people.add(personData);
            }
            
            e.target.reset(); 
            closeAllModals(); 
            renderPeople(); 
            renderJustice(); 
            updateDropdowns();
        };

        document.getElementById('guardForm').onsubmit = async (e) => { e.preventDefault(); await db.guards.add({ type: document.getElementById('gType').value, location: document.getElementById('gLoc').value, rank: document.getElementById('gRank').value, armory: document.getElementById('gArm').value }); e.target.reset(); closeAllModals(); renderGuards(); updateDropdowns(); };
        document.getElementById('dutyForm').onsubmit = async (e) => { e.preventDefault(); await db.duties.add({ type: document.getElementById('dType').value, location: document.getElementById('dLoc').value, rank: document.getElementById('dRank').value }); e.target.reset(); closeAllModals(); renderDuties(); updateDropdowns(); };
        document.getElementById('execForm').onsubmit = async (e) => { e.preventDefault(); const [cat, score, name] = document.getElementById('execTask').value.split('|'); await db.executions.add({ personalId: document.getElementById('execPerson').value, score: score, taskName: name, category: cat, date: document.getElementById('execDate').value }); closeAllModals(); renderJustice(); };

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-blue-600', 'text-gray-400'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.replace('text-gray-400', 'text-blue-600');
            document.getElementById('page-title').innerText = {justice:'טבלת צדק', people:'אנשים', guards:'שמירות', duties:'תורנויות'}[id];
            if(id === 'guards') renderGuards(); if(id === 'duties') renderDuties(); if(id === 'people') renderPeople(); if(id === 'justice') renderJustice();
            lucide.createIcons();
        }

        async function deleteItem(table, id) { if(confirm('למחוק?')) { await db[table].delete(id); renderGuards(); renderDuties(); updateDropdowns(); } }
        function openModal(id) { document.getElementById(id + 'Modal').style.display = 'block'; }
        function closeAllModals() { 
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); 
            editingPersonId = null; 
            document.getElementById('pId').disabled = false; 
            document.getElementById('personModalTitle').innerText = "הוספת חייל"; 
        }
        function closeModalOnBackdrop(e) { if(e.target.classList.contains('modal')) closeAllModals(); }

        window.onload = init;
    </script>
</body>
</html>
