<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>מערכת טבלת צדק</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --ios-bg: #F2F2F7; --ios-blue: #007AFF; }
        body { 
            background-color: var(--ios-bg); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        /* תיקון השעון וה-Dynamic Island */
        .safe-top { 
            padding-top: calc(env(safe-area-inset-top) + 10px); 
        }
        .tab-content { display: none; padding-bottom: 140px; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .ios-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; backdrop-filter: blur(10px); }
        .modal-content { position: absolute; bottom: 0; width: 100%; background: white; border-radius: 20px 20px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto; padding-bottom: 60px; }
        
        input, select, textarea { width: 100%; border: 1px solid #ddd; padding: 14px; border-radius: 12px; background: #f9f9f9; margin-bottom: 12px; font-size: 16px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--ios-blue); }
        .btn-primary { background: var(--ios-blue); color: white; padding: 16px; border-radius: 14px; font-weight: bold; width: 100%; }
        .btn-secondary { background: #E9E9EB; color: #000; padding: 12px; border-radius: 12px; font-weight: 500; width: 100%; text-align: center; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b px-5 py-4 flex justify-between items-center safe-top">
        <h1 id="page-title" class="text-2xl font-bold tracking-tight">טבלת צדק</h1>
        <button onclick="openModal('addExecution')" class="bg-blue-600 text-white p-2 rounded-full shadow-lg active:scale-90 transition">
            <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
    </header>

    <main class="p-4">
        <section id="justice" class="tab-content active">
            <div class="flex gap-2 mb-4">
                <select id="justiceSort" onchange="renderJustice()" class="flex-1 shadow-sm">
                    <option value="totalDesc">מיון: ציון גבוה</option>
                    <option value="totalAsc">מיון: ציון נמוך</option>
                </select>
                <input type="text" id="justiceFilter" oninput="renderJustice()" placeholder="Show only..." class="flex-1 shadow-sm">
            </div>
            <div id="justiceList"></div>
        </section>

        <section id="people" class="tab-content">
            <div class="flex gap-2 mb-4">
                <input type="text" id="peopleFilter" oninput="renderPeople()" placeholder="חפש איש..." class="flex-1">
                <button onclick="openModal('addPerson')" class="bg-blue-600 text-white px-4 rounded-xl"><i data-lucide="user-plus"></i></button>
            </div>
            <div id="peopleList"></div>
        </section>

        <section id="tasks" class="tab-content">
            <h2 class="font-bold mb-2 text-gray-500 text-sm">ניהול שמירות</h2>
            <button onclick="openModal('addGuard')" class="ios-card w-full flex items-center justify-center gap-2 text-blue-600 font-bold mb-6 border-2 border-dashed border-blue-100">
                <i data-lucide="shield-plus"></i> הגדרת שמירה
            </button>
            <div id="guardsList"></div>
            
            <h2 class="font-bold mb-2 text-gray-500 text-sm mt-8">ניהול תורנויות</h2>
            <button onclick="openModal('addDuty')" class="ios-card w-full flex items-center justify-center gap-2 text-blue-600 font-bold mb-4 border-2 border-dashed border-blue-100">
                <i data-lucide="clipboard-list"></i> הגדרת תורנות
            </button>
            <div id="dutiesList"></div>
        </section>

        <section id="settings" class="tab-content">
            <div class="ios-card">
                <h3 class="font-bold text-lg mb-4">גיבוי וסנכרון נתונים</h3>
                <p class="text-sm text-gray-500 mb-4">הנתונים נשמרים מקומית על האייפון. מומלץ לייצא קובץ גיבוי פעם בשבוע.</p>
                
                <button onclick="exportData()" class="btn-primary flex items-center justify-center gap-2 mb-3">
                    <i data-lucide="download"></i> ייצוא גיבוי (Export)
                </button>
                
                <label class="btn-secondary flex items-center justify-center gap-2 cursor-pointer">
                    <i data-lucide="upload"></i> ייבוא גיבוי (Import)
                    <input type="file" id="importFile" class="hidden" onchange="importData(event)">
                </label>
            </div>
            <div class="text-center text-[10px] text-gray-300 mt-10 uppercase tracking-widest">Justice App V1.2 - Local Storage Only</div>
        </section>
    </main>

    <nav class="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t flex justify-around py-4 pb-10 z-50">
        <button onclick="switchTab('justice')" id="btn-justice" class="text-blue-600 flex flex-col items-center"><i data-lucide="scale"></i><span class="text-[10px] mt-1 font-bold">צדק</span></button>
        <button onclick="switchTab('people')" id="btn-people" class="text-gray-400 flex flex-col items-center"><i data-lucide="users"></i><span class="text-[10px] mt-1 font-bold">אנשים</span></button>
        <button onclick="switchTab('tasks')" id="btn-tasks" class="text-gray-400 flex flex-col items-center"><i data-lucide="list-checks"></i><span class="text-[10px] mt-1 font-bold">משימות</span></button>
        <button onclick="switchTab('settings')" id="btn-settings" class="text-gray-400 flex flex-col items-center"><i data-lucide="settings"></i><span class="text-[10px] mt-1 font-bold">הגדרות</span></button>
    </nav>

    <div id="addExecutionModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2 class="text-xl font-bold mb-4">שיבוץ חדש</h2><form id="execForm"><select id="execPerson" required></select><select id="execTask" required></select><input type="date" id="execDate" required><button type="submit" class="btn-primary mt-4">שמור</button></form></div></div>
    <div id="addPersonModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2 class="text-xl font-bold mb-4">הוספת חייל</h2><form id="personForm"><input type="number" id="pId" placeholder="מ.א" required><input type="text" id="pName" placeholder="שם מלא" required><input type="text" id="pSection" placeholder="מדור" required><input type="text" id="pTeam" placeholder="צוות" required><textarea id="pExemptions" placeholder="פטורים..."></textarea><button type="submit" class="btn-primary">הוסף</button></form></div></div>
    <div id="addGuardModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2 class="text-xl font-bold mb-4">סוג שמירה</h2><form id="guardForm"><input type="text" id="gType" placeholder="שם השמירה" required><input type="number" id="gRank" placeholder="ניקוד" required><button type="submit" class="btn-primary">שמור</button></form></div></div>
    <div id="addDutyModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><h2 class="text-xl font-bold mb-4">סוג תורנות</h2><form id="dutyForm"><input type="text" id="dType" placeholder="שם התורנות" required><input type="number" id="dRank" placeholder="ניקוד" required><button type="submit" class="btn-primary">שמור</button></form></div></div>
    <div id="personInfoModal" class="modal" onclick="closeModalOnBackdrop(event)"><div class="modal-content"><div id="personDetailsUI"></div><div id="personHistoryUI" class="mt-4 space-y-2"></div><button id="deletePersonBtn" class="w-full text-red-500 font-bold py-6 mt-6 border-t">מחק איש</button><button onclick="closeAllModals()" class="w-full py-4 text-gray-400">סגור</button></div></div>

    <script>
        const db = new Dexie("ZadekFullDB");
        db.version(1).stores({
            people: 'personalId, name, section, team, serviceType, exemptions',
            guards: '++id, type, location, rank',
            duties: '++id, type, location, rank',
            executions: '++id, taskId, personalId, date, category, score, taskName'
        });

        async function init() { lucide.createIcons(); renderJustice(); updateDropdowns(); }

        // --- EXPORT / IMPORT LOGIC ---
        async function exportData() {
            const data = {
                people: await db.people.toArray(),
                guards: await db.guards.toArray(),
                duties: await db.duties.toArray(),
                executions: await db.executions.toArray()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `justice_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const data = JSON.parse(e.target.result);
                if (confirm("זה ימחוק את הנתונים הנוכחיים ויחליף אותם בגיבוי. להמשיך?")) {
                    await db.people.clear(); await db.guards.clear(); await db.duties.clear(); await db.executions.clear();
                    await db.people.bulkAdd(data.people);
                    await db.guards.bulkAdd(data.guards);
                    await db.duties.bulkAdd(data.duties);
                    await db.executions.bulkAdd(data.executions);
                    alert("הנתונים יובאו בהצלחה!");
                    location.reload();
                }
            };
            reader.readAsText(file);
        }

        // --- UI & RENDER ---
        async function renderJustice() {
            const filter = document.getElementById('justiceFilter').value.toLowerCase();
            const sort = document.getElementById('justiceSort').value;
            const people = await db.people.toArray();
            const execs = await db.executions.toArray();
            let data = people.map(p => {
                const pExecs = execs.filter(e => e.personalId == p.personalId);
                const gScore = pExecs.filter(e => e.category === 'guard').reduce((s, e) => s + Number(e.score), 0);
                const dScore = pExecs.filter(e => e.category === 'duty').reduce((s, e) => s + Number(e.score), 0);
                return { ...p, gScore, dScore, total: gScore + dScore };
            });
            if(filter) data = data.filter(p => p.name.includes(filter) || p.personalId.toString().includes(filter));
            data.sort((a,b) => sort === 'totalDesc' ? b.total - a.total : a.total - b.total);
            document.getElementById('justiceList').innerHTML = data.map(p => `
                <div class="ios-card flex justify-between items-center" onclick="showPerson('${p.personalId}')">
                    <div><div class="font-bold text-lg">${p.name}</div><div class="text-xs text-gray-400">${p.section}</div></div>
                    <div class="text-left"><div class="text-2xl font-black text-blue-600">${p.total}</div></div>
                </div>`).join('');
        }

        async function renderPeople() {
            const people = await db.people.toArray();
            document.getElementById('peopleList').innerHTML = people.map(p => `<div class="ios-card" onclick="showPerson('${p.personalId}')"><strong>${p.name}</strong><br><span class="text-xs text-gray-500">${p.personalId}</span></div>`).join('');
        }

        async function renderTasks() {
            const g = await db.guards.toArray();
            const d = await db.duties.toArray();
            document.getElementById('guardsList').innerHTML = g.map(i => `<div class="ios-card flex justify-between">${i.type} (${i.rank}) <button onclick="deleteItem('guards', ${i.id})" class="text-red-400"><i data-lucide="trash-2" class="w-4"></i></button></div>`).join('');
            document.getElementById('dutiesList').innerHTML = d.map(i => `<div class="ios-card flex justify-between">${i.type} (${i.rank}) <button onclick="deleteItem('duties', ${i.id})" class="text-red-400"><i data-lucide="trash-2" class="w-4"></i></button></div>`).join('');
            lucide.createIcons();
        }

        async function showPerson(id) {
            const p = await db.people.get(id);
            const execs = await db.executions.where('personalId').equals(id).toArray();
            document.getElementById('personDetailsUI').innerHTML = `<h2 class="text-2xl font-bold">${p.name}</h2><p class="text-gray-500">מ.א ${p.personalId}</p><div class="bg-blue-50 p-3 rounded-lg mt-2 text-sm">פטורים: ${p.exemptions || 'אין'}</div>`;
            document.getElementById('personHistoryUI').innerHTML = execs.map(e => `<div class="flex justify-between text-xs border-b pb-1"><span>${e.date} - ${e.taskName}</span><span class="font-bold text-blue-600">+${e.score}</span></div>`).join('');
            document.getElementById('deletePersonBtn').onclick = async () => { if(confirm('למחוק?')) { await db.people.delete(id); await db.executions.where('personalId').equals(id).delete(); closeAllModals(); renderJustice(); } };
            openModal('personInfo');
        }

        async function updateDropdowns() {
            const p = await db.people.toArray();
            const g = await db.guards.toArray();
            const d = await db.duties.toArray();
            document.getElementById('execPerson').innerHTML = p.map(i => `<option value="${i.personalId}">${i.name}</option>`).join('');
            let tasks = g.map(i => `<option value="guard|${i.rank}|${i.type}">${i.type} (${i.rank})</option>`).join('');
            tasks += d.map(i => `<option value="duty|${i.rank}|${i.type}">${i.type} (${i.rank})</option>`).join('');
            document.getElementById('execTask').innerHTML = tasks;
        }

        // Forms
        document.getElementById('personForm').onsubmit = async (e) => { e.preventDefault(); await db.people.add({ personalId: document.getElementById('pId').value, name: document.getElementById('pName').value, section: document.getElementById('pSection').value, team: document.getElementById('pTeam').value, exemptions: document.getElementById('pExemptions').value }); e.target.reset(); closeAllModals(); renderPeople(); renderJustice(); updateDropdowns(); };
        document.getElementById('guardForm').onsubmit = async (e) => { e.preventDefault(); await db.guards.add({ type: document.getElementById('gType').value, rank: document.getElementById('gRank').value }); e.target.reset(); closeAllModals(); renderTasks(); updateDropdowns(); };
        document.getElementById('dutyForm').onsubmit = async (e) => { e.preventDefault(); await db.duties.add({ type: document.getElementById('dType').value, rank: document.getElementById('dRank').value }); e.target.reset(); closeAllModals(); renderTasks(); updateDropdowns(); };
        document.getElementById('execForm').onsubmit = async (e) => { e.preventDefault(); const [cat, score, name] = document.getElementById('execTask').value.split('|'); await db.executions.add({ personalId: document.getElementById('execPerson').value, score: score, taskName: name, category: cat, date: document.getElementById('execDate').value }); closeAllModals(); renderJustice(); };

        // Navigation
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-blue-600', 'text-gray-400'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.replace('text-gray-400', 'text-blue-600');
            document.getElementById('page-title').innerText = {justice:'טבלת צדק', people:'אנשים', tasks:'משימות', settings:'הגדרות'}[id];
            if(id === 'tasks') renderTasks();
            if(id === 'people') renderPeople();
            if(id === 'justice') renderJustice();
        }

        async function deleteItem(table, id) { if(confirm('למחוק?')) { await db[table].delete(id); renderTasks(); updateDropdowns(); } }
        function openModal(id) { document.getElementById(id + 'Modal').style.display = 'block'; }
        function closeAllModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
        function closeModalOnBackdrop(e) { if(e.target.classList.contains('modal')) closeAllModals(); }

        window.onload = init;
    </script>
</body>
</html>
